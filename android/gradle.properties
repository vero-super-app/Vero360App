# Gradle heap lowered so Dart (kernel snapshot) has room alongside the Gradle daemon on 16GB PCs.
org.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=768m -XX:ReservedCodeCacheSize=256m -XX:+HeapDumpOnOutOfMemoryError
org.gradle.parallel=false
org.gradle.workers.max=2
android.useAndroidX=true
android.enableJetifier=true
